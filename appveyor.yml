image: Visual Studio 2022
platform: x64  # This tells AppVeyor to use a 64-bit worker

# This ensures we don't use the default MSBuild logic
build: off 

install:
  # Force 64-bit Python 3.12 onto the PATH
  - SET PATH=C:\Python312-x64;C:\Python312-x64\Scripts;%PATH%
  - python --version
  
  # Install dependencies
  - pip install pybind11 pyinstaller numpy vtk scipy matplotlib pandas pyqtgraph PySide6 pyvista

build_script:
  - mkdir build
  - cd build
  # Get the pybind11 path for CMake
  - for /f "delims=" %%i in ('python -m pybind11 --cmakedir') do set PYBIND11_DIR=%%i
  
  # EXPLICIT 64-BIT BUILD:
  # -G "Visual Studio 17 2022" + -A x64 forces 64-bit compilation
  - cmake .. -G "Visual Studio 17 2022" -A x64 -Dpybind11_DIR=%PYBIND11_DIR%
  - cmake --build . --config Release
  - cd ..

  # Bundle the 64-bit binary
  - pyinstaller --onefile --noconsole --name "OpenTurbine" ^
      --add-binary "build\Release\openturbine_core.dll;." ^
      src\ui\main_window.py

artifacts:
  - path: dist\OpenTurbine.exe
    name: OpenTurbine_Windows_64bit