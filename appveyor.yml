image: Visual Studio 2022  # Use a modern Windows environment
platform: x64

stack: python 3.10  # Pre-installs Python 3.10 for you

install:
  # Force the 64-bit version of Python
  - SET PATH=C:\Python312-x64;C:\Python312-x64\Scripts;%PATH%
  - python --version
  
  # Now upgrade and install
  - python -m pip install --upgrade pip
  - pip install pyinstaller numpy vtk
  - pip install scipy matplotlib pandas
  - pip install pyqtgraph PySide6 pyvista

build_script:
  - cmd: mkdir build
  - cmd: cd build
  - cmd: cmake .. -G "Visual Studio 17 2022" -A x64
  - cmd: cmake --build . --config Release
  - cmd: cd ..

  - cmd: pyinstaller --onefile --noconsole --name "OpenTurbine" --add-binary "build\Release\openturbine_core.dll;." src\ui\main_window.py

artifacts:
  # This tells AppVeyor to "save" the file so you can download it
  - path: dist\OpenTurbine.exe
    name: OpenTurbine_Windows_Build