image: Visual Studio 2022
platform: x64

build: off

install:
  - SET PATH=C:\Python312-x64;C:\Python312-x64\Scripts;%PATH%
  - python --version
  - pip install pybind11 pyinstaller numpy vtk scipy matplotlib pandas pyqtgraph PySide6 pyvista
  - curl -L https://gitlab.com/libeigen/eigen/-/archive/3.4.0/eigen-3.4.0.zip -o eigen.zip
  - 7z x eigen.zip -y > nul
  - mkdir build
  - cd build
  - cmake .. -G "Visual Studio 17 2022" -A x64 -Dpybind11_DIR=C:\Python312-x64\Lib\site-packages\pybind11\share\cmake\pybind11 -DPython3_EXECUTABLE=C:\Python312-x64\python.exe -DEIGEN3_INCLUDE_DIR=C:\projects\openturbine-yshim\eigen-3.4.0
  - cmake --build . --config Release
  - cd ..
  - pyinstaller --onefile --noconsole --name "OpenTurbine" --add-binary "build\Release\openturbine_core.dll;." src\ui\main_window.py

artifacts:
  - path: dist\OpenTurbine.exe
    name: OpenTurbine_Windows_64bit