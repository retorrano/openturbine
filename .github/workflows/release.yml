name: Build Release Binaries

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., 0.1.0)'
        required: true
        default: '0.1.0'
  release:
    types: [published]

env:
  VERSION: ${{ inputs.version || github.event.release.tag_name }}

jobs:
  build-linux:
    name: Build Linux Binary
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-glx libglib2.0-0 libsm6 libxrender1 libxext6 libgomp1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install numpy scipy matplotlib pandas pyqtgraph PySide6 vtk pyvista pyinstaller

      - name: Build executable
        run: |
          pip install -e .
          pyinstaller --onefile --windowed \
            --name openturbine-${{ env.VERSION }}-linux \
            --add-data "src/openturbine/configs:openturbine/configs" \
            src/openturbine/ui/main_window.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: openturbine-linux
          path: dist/openturbine-${{ env.VERSION }}-linux

  build-windows:
    name: Build Windows Binary
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install numpy scipy matplotlib pandas pyqtgraph PySide6 vtk pyvista pyinstaller

      - name: Build executable
        shell: bash
        run: |
          pip install -e .
          pyinstaller --onefile --windowed ^
            --name openturbine-${{ env.VERSION }}-windows.exe ^
            --add-data "src/openturbine/configs;openturbine/configs" ^
            src/openturbine/ui/main_window.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: openturbine-windows
          path: dist/openturbine-${{ env.VERSION }}-windows.exe

  create-release:
    needs: [build-linux, build-windows]
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: OpenTurbine ${{ env.VERSION }}
          draft: false
          prerelease: false
          files: |
            artifacts/openturbine-linux/openturbine-${{ env.VERSION }}-linux
            artifacts/openturbine-windows/openturbine-${{ env.VERSION }}-windows.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
