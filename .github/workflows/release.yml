name: Release Builds

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-native:
    strategy:
      matrix:
        os: [windows-latest, macos-latest]
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            suffix: .exe
          - os: macos-latest
            target: aarch64-apple-darwin
            suffix: ""

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      
      - name: Build release
        run: cargo build --release --target ${{ matrix.target }} -p openturbine_gui
        
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: openturbine-${{ matrix.os }}
          path: target/${{ matrix.target }}/release/openturbine_gui${{ matrix.suffix }}

  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      
      - name: Install wasm-bindgen
        run: cargo install wasm-bindgen-cli
        
      - name: Build WASM
        run: |
          cargo build --release --target wasm32-unknown-unknown -p openturbine_gui
          wasm-bindgen --out-dir ./out --target web target/wasm32-unknown-unknown/release/openturbine_gui.wasm
          
      - name: Create Index HTML
        run: |
          cat <<EOF > ./out/index.html
          <!DOCTYPE html>
          <html lang="en">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>OpenTurbine Web</title>
              <style>
                  body { margin: 0; background: #111; overflow: hidden; }
                  canvas { width: 100vw; height: 100vh; display: block; }
              </style>
          </head>
          <body>
              <script type="module">
                  import init from './openturbine_gui.js';
                  init();
              </script>
          </body>
          </html>
          EOF

      - name: Upload Web Artifact
        uses: actions/upload-artifact@v4
        with:
          name: openturbine-web
          path: ./out/
